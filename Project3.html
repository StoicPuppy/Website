                    <img src="Assets/TLP2.png" alt="The Last Pilgrim">
                        <figcaption class="description">The last Pilgrim is a collaborative team project that I worked on. We created a third person Open World RPG where the player must kill dangerous monsters and collect various items in order to complete a series of quests.</figcaption>
                        <figcaption class="description">
                            <h2>Software used</h2>
                            <ul class="Experience_list">
                                <li class="list_item">Unity Engine</li>
                                <li class="list_item">C#</li>
                              </ul>
                        </figcaption>
                        <figcaption class="description">This game was very difficult to make because my team and I had to figure out how to properly rig the player character and implement proper animations for the aiming and reloading of the gun. I designed and created multiple areas in our game that the player could explore and fight enemies in. This game was a driving factor in my newfound love of map design. </figcaption>
                        <figcaption class="description">When designing a map, it’s important to understand what your game is about. When I was first coming up with ideas, I wanted the player to explore an abandoned town that had become a nesting place for monsters. Unfortunately, there were size limitations for our project and thus we settled on a forest. Forests are always teeming with strange creatures in fantasy worlds, and they make an ideal place for a lone hunter like the player to explore and gather materials. To make the forest a bit more intimidating, I made sure to limit just how far the player could see, just to give that extra tension</figcaption>
                </figure>
