            <section class="project_display">
                <h2 class="slide-left" id="project1">Corptech Cleanup</h2>
                <figure class="project_content">
                    <img src="Assets/Corptech_Cleanup.png" alt="Corptech_Cleanup">
                        <figcaption class="description">
                            Corptech Cleanup is an action-packed boss rush type game my team and I created for our final project. I was in charge of the 3D modeling and level design and made over a hundred different models for our game. The game is comprised of 3 levels that the player must traverse and fight various bosses in order to progress to the next level.
                        </figcaption>
                        <img src="Assets/Corptech_Cleanup2.png" alt="Corptech_Cleanup">
                        <figcaption class="description">
                            The first level for the game takes place inside a warehouse that has been taken over by a giant raging boar. The goal of the level is to lead the boss into various traps until it is defeated. I had to make models for the shelves, and which hold boxes and barrels, and design the layout of the level so it would be scary, intimidating, but fun to navigate.
                        </figcaption>
                        
                </figure>
            </section>
            <section class="project_display">
                <h2 class="slide-left" id="project2">Come Home Space Man</h2>
                <figure class="project_content">
                    <img src="Assets/CHSM.png" alt="Come Home Space Man">
                        <figcaption class="description">Come Home Space Man is a small Unity game I worked on by myself when I was first learning how to use the unity engine. It’s a 2D platformer game where you collect fruit and try your best to get home without getting hurt by spikes!</figcaption>
                        <figcaption class="description">
                            The game is relatively small and features only 2 levels but it was a great first attempt at using the Unity Engine and testing my game development skills.
                        </figcaption>
                        <figcaption class="description">
                            I find 2D platformers to be fun yet relaxing games. When I was coming up with ideas for the game, I wanted to make sure that the atmosphere of the game invited a warm feeling from the player. I also chose to not include time limits for the levels because I wanted to give the player the opportunity to explore without feeling any pressure. Of course, for those who are interested in completing the game in the fastest time, the game does tell you how much time you took to gather all the fruit and reach the objective.
                        </figcaption>
                </figure>
            </section>
            <section class="project_display">
                <h2 class="slide-left" id="project3">The Last Pilgrim</h2>
                <figure class="project_content">
                    <img src="Assets/TLP.png" alt="The Last Pilgrim">
                        <figcaption class="description">The last Pilgrim is a collaborative team project that I worked on. We created a third person Open World RPG where the player must kill dangerous monsters and collect various items in order to complete a series of quests.</figcaption>
                        <figcaption class="description">This game was very difficult to make because my team and I had to figure out how to properly rig the player character and implement proper animations for the aiming and reloading of the gun. I designed and created multiple areas in our game that the player could explore and fight enemies in. This game was a driving factor in my newfound love of map design. </figcaption>
                        <figcaption class="description">When designing a map, it’s important to understand what your game is about. When I was first coming up with ideas, I wanted the player to explore an abandoned town that had become a nesting place for monsters. Unfortunately, there were size limitations for our project and thus we settled on a forest. Forests are always teeming with strange creatures in fantasy worlds, and they make an ideal place for a lone hunter like the player to explore and gather materials. To make the forest a bit more intimidating, I made sure to limit just how far the player could see, just to give that extra tension</figcaption>
                </figure>
            </section>
